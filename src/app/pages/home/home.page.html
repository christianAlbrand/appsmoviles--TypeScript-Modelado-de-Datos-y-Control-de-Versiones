<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>TaskList v2</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-item>
    <ion-input type="text" placeholder="ingresa una nueva tarea" name="taskInput" [(ngModel)]="newTaskStr"></ion-input>
    <ion-button (click)="addTask()">
      <!-- <ion-icon name="add-outline"></ion-icon> -->
      <ion-icon name="add-circle-outline"></ion-icon>
    </ion-button>
  </ion-item>

  @if (tasks.length > 0){
    <ion-list>
      @for (task of tasks; track task){
        <ion-item-sliding>
          <ion-item>
            <ion-label>{{task.titulo}}</ion-label>
            <ion-label>{{task.descripcion}}</ion-label>
          </ion-item>
        </ion-item-sliding>
        <ion-item-options side="end">
          <ion-item-option color="danger">
            <ion-icon name="trash-outline" slot="icon-only" (click)="confirmDelete(task)"></ion-icon>
          </ion-item-option>
        </ion-item-options>
        
      }
    </ion-list>
  } @else {
    <ion-item lines="none" class="ion-text-center">
      No hay tareas pendientes
    </ion-item>
  }
    

</ion-content>
