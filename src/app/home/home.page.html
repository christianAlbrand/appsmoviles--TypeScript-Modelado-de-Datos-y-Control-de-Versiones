<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>TaskMaster Title</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-item>
    <ion-label position="stacked">Nueva tarea!</ion-label>
    <ion-input [(ngModel)]="newTaskStr" placeholder="Estudiar TypeScript"></ion-input>
  </ion-item>
  <ion-button expand="block" color="primary" (click)="addTask()">Agregar tarea</ion-button>

  <ion-list>
    @for( task of tasks; track task.id){
      <ion-item>
        <ion-label>
          <h2>{{ task.titulo }}</h2>
          <p>{{ task.descripcion }}</p>
          <p>Prioridad: {{ task.prioridad }}</p>
          <p>Estado: {{ task.finalizado ? 'Finalizada' : 'Pendiente' }}</p>
        </ion-label>
      </ion-item>
    }
  </ion-list>
</ion-content>
